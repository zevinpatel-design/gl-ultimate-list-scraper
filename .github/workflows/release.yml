name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          MAN=$(jq -r .version manifest.json)
          echo "Tag: $TAG  |  manifest.json version: $MAN"
          if [ "$TAG" != "$MAN" ]; then
            echo "::error::Tag $REF_NAME does not match manifest.json version $MAN"
            exit 1
          fi

      - name: Build extension ZIP
        id: build
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/build.sh
          ZIP_NAME="ultimate-scraper-${REF_NAME}.zip"
          ./scripts/build.sh "$ZIP_NAME"
          SHA=$(sha256sum "$ZIP_NAME" | cut -d' ' -f1)
          {
            echo "zip=$ZIP_NAME"
            echo "sha256=$SHA"
          } >> "$GITHUB_OUTPUT"
          echo "Built $ZIP_NAME with SHA256 $SHA"

      - name: Extract changelog section
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          # Extract the section starting with "## [VERSION]" up to (but not including) the next "## [" heading.
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { found=0 }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "No CHANGELOG.md entry found for version $VERSION"
            echo "changes=" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'changes<<CHANGELOG_EOF'
              printf '%s\n' "$BODY"
              echo 'CHANGELOG_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Compose release body
        id: body
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA256: ${{ steps.build.outputs.sha256 }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.changes }}
        run: |
          OUT_FILE=release_body.md
          {
            echo "SHA256: $SHA256"
            echo
            if [ -n "$CHANGELOG_BODY" ]; then
              printf '%s\n' "$CHANGELOG_BODY"
            else
              echo "Release $REF_NAME."
              echo "(No matching CHANGELOG.md entry found — please add one for future releases.)"
            fi
            echo
            echo '---'
            echo 'Installation: download the ZIP, extract it, and load the unpacked folder via chrome://extensions (developer mode on).'
            echo 'If you already have an older version installed, use the in-extension Update button — it will guide you through the file replacement and reload.'
          } > "$OUT_FILE"
          echo "body_file=$OUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip }}
          body_path: ${{ steps.body.outputs.body_file }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
